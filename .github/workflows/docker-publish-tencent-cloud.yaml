name: Push to Tencent Cloud TCR

on:
  push:
    branches:
      - master  # 请根据你的实际主分支名称调整（如 main）
    paths:  # 仅在指定文件变化时触发（可选）
      - 'core/ver.py'
  workflow_dispatch:  # 保留手动触发按钮，方便排错和补发

env:
  TENCENT_REGISTRY: ccr.ccs.tencentyun.com # 腾讯云个人版默认地址

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 开启 Buildx 支持（构建更快，且支持高级缓存和多架构）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 截取 7 位 Git Commit Hash 作为防回滚的静态 Tag
      - name: Set short git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      # 登录腾讯云镜像仓库
      - name: Log in to Tencent Cloud TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_USER }}
          password: ${{ secrets.TENCENT_TOKEN }}

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 如果你的轻量服务器只有 x86 架构（amd64），建议注释掉下一行多架构构建，能大幅提升构建速度
          # platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.TENCENT_REGISTRY }}/${{ secrets.TENCENT_NAMESPACE }}/${{ github.event.repository.name }}:${{ env.short_sha }}
            ${{ env.TENCENT_REGISTRY }}/${{ secrets.TENCENT_NAMESPACE }}/${{ github.event.repository.name }}:latest